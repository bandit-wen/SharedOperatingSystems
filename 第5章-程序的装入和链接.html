<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>程序装入和链接 · 流水线动态演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #e0e8f0 100%);
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #1e3a5f;
            padding: 1.2rem 2rem;
            color: white;
        }
        .header h1 {
            font-weight: 700;
            font-size: 1.6rem;
        }
        .header p {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        .pipeline {
            padding: 2rem;
            background: #ffffff;
            overflow-x: auto;
        }

        /* 流水线布局：flex 从左到右 */
        .flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: nowrap;
            min-width: 900px;
        }

        .stage {
            flex: 1;
            background: #f8fafc;
            border-radius: 28px;
            padding: 1rem 0.8rem;
            text-align: center;
            border: 1px solid #e2ecf3;
            transition: all 0.3s ease;
            position: relative;
        }

        .stage.active {
            background: #eef3fc;
            border: 2px solid #2c7da0;
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.1);
        }

        .stage-title {
            font-weight: 700;
            color: #2c7da0;
            margin-bottom: 0.5rem;
        }

        .stage-content {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 0.5rem 0.8rem;
            width: 100%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #dce5ec;
        }

        .card-icon {
            font-size: 1.5rem;
        }

        .arrow {
            font-size: 1.8rem;
            color: #8aa5bc;
            flex-shrink: 0;
        }

        /* 动态特效 */
        .fly-in {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .merge-pulse {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); background: #fff1cf; }
            100% { transform: scale(1); background: white; }
        }

        .control-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 2rem;
            background: #f1f5f9;
            border-top: 1px solid #e2ecf3;
        }

        button {
            background: #2c7da0;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.05s linear;
        }

        button.secondary {
            background: #6c8ea8;
        }

        button:active {
            transform: scale(0.96);
        }

        .log-area {
            background: #1e2a36;
            color: #cbd5e6;
            padding: 0.8rem 1.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 100px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 0.2rem 0;
            border-bottom: 1px solid #2a3a48;
        }

        footer {
            background: #ecf3f8;
            padding: 0.6rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6f8eaa;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📦 程序的装入和链接 · 流水线动画</h1>
        <p>编译 → 链接 → 装入 | 模块连续流动，逐步演化</p>
    </div>

    <div class="pipeline" id="pipeline">
        <div class="flow" id="flowContainer">
            <!-- 阶段0: 源程序 -->
            <div class="stage" id="stageSource">
                <div class="stage-title">📄 源程序</div>
                <div class="stage-content" id="sourceContent">
                    <div class="card"><span class="card-icon">📜</span> main.c</div>
                    <div class="card"><span class="card-icon">📜</span> foo.c</div>
                </div>
            </div>
            <div class="arrow">→</div>
            <!-- 阶段1: 编译结果 -->
            <div class="stage" id="stageObj">
                <div class="stage-title">🔧 目标模块</div>
                <div class="stage-content" id="objContent">
                    <div class="card" style="opacity:0.3;">待生成</div>
                </div>
            </div>
            <div class="arrow">→</div>
            <!-- 阶段2: 链接 + 库 -->
            <div class="stage" id="stageLink">
                <div class="stage-title">⛓️ 链接</div>
                <div class="stage-content" id="linkContent">
                    <div class="card" style="opacity:0.3;">等待目标模块</div>
                </div>
            </div>
            <div class="arrow">→</div>
            <!-- 阶段3: 装入模块 -->
            <div class="stage" id="stageExec">
                <div class="stage-title">📀 装入模块</div>
                <div class="stage-content" id="execContent">
                    <div class="card" style="opacity:0.3;">待链接</div>
                </div>
            </div>
            <div class="arrow">→</div>
            <!-- 阶段4: 内存 -->
            <div class="stage" id="stageMem">
                <div class="stage-title">🗄️ 内存</div>
                <div class="stage-content" id="memContent">
                    <div class="card" style="opacity:0.3;">等待装入</div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <button id="prevBtn" class="secondary">◀ 上一步</button>
        <button id="nextBtn">下一步 ▶</button>
        <button id="resetBtn">⟳ 重置</button>
    </div>

    <div class="log-area" id="logArea">
        <div class="log-entry">✨ 点击「下一步」，观察模块从左向右流动</div>
    </div>
    <footer>💡 每个阶段对应程序转换的关键步骤，模块会动态飞入、合并，最终装入内存。</footer>
</div>

<script>
    // 阶段定义：0源程序，1目标模块，2链接（含库），3装入模块，4内存
    let currentStage = 0;
    const maxStage = 4;

    // 获取各个内容容器
    const sourceDiv = document.getElementById('sourceContent');
    const objDiv = document.getElementById('objContent');
    const linkDiv = document.getElementById('linkContent');
    const execDiv = document.getElementById('execContent');
    const memDiv = document.getElementById('memContent');

    const stageElements = document.querySelectorAll('.stage');
    const logDiv = document.getElementById('logArea');

    function addLog(msg) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        entry.innerText = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        while (logDiv.children.length > 12) logDiv.removeChild(logDiv.firstChild);
    }

    // 高亮当前阶段
    function highlightStage(stageIdx) {
        stageElements.forEach((el, idx) => {
            if (idx === stageIdx) el.classList.add('active');
            else el.classList.remove('active');
        });
    }

    // 根据stage渲染各个容器的内容，并添加动画类
    function renderStage(stage) {
        // 清空所有内容容器（保留结构）
        objDiv.innerHTML = '';
        linkDiv.innerHTML = '';
        execDiv.innerHTML = '';
        memDiv.innerHTML = '';
        // 源程序内容固定不变
        sourceDiv.innerHTML = `
            <div class="card"><span class="card-icon">📜</span> main.c</div>
            <div class="card"><span class="card-icon">📜</span> foo.c</div>
        `;

        // 根据stage填充不同阶段内容
        if (stage >= 1) {
            // 目标模块已生成
            objDiv.innerHTML = `
                <div class="card fly-in"><span class="card-icon">🔧</span> main.o</div>
                <div class="card fly-in"><span class="card-icon">🔧</span> foo.o</div>
            `;
        } else {
            objDiv.innerHTML = `<div class="card" style="opacity:0.4;">⏳ 待编译</div>`;
        }

        if (stage >= 2) {
            // 链接阶段: 显示目标模块 + 库函数合并动画
            linkDiv.innerHTML = `
                <div class="card merge-pulse"><span class="card-icon">📚</span> 库函数 (libc)</div>
                <div class="card merge-pulse"><span class="card-icon">⛓️</span> 符号解析</div>
            `;
        } else {
            linkDiv.innerHTML = `<div class="card" style="opacity:0.4;">⏳ 等待链接</div>`;
        }

        if (stage >= 3) {
            // 装入模块生成
            execDiv.innerHTML = `
                <div class="card fly-in"><span class="card-icon">📀</span> 可执行文件 (ELF/PE)</div>
                <div class="card fly-in"><span class="card-icon">📊</span> 代码段+数据段</div>
            `;
        } else {
            execDiv.innerHTML = `<div class="card" style="opacity:0.4;">⏳ 未生成</div>`;
        }

        if (stage >= 4) {
            // 装入内存
            memDiv.innerHTML = `
                <div class="card fly-in"><span class="card-icon">🏠</span> 代码段 0x1000</div>
                <div class="card fly-in"><span class="card-icon">📊</span> 数据段 0x2000</div>
                <div class="card fly-in"><span class="card-icon">📈</span> 堆栈段</div>
            `;
        } else {
            memDiv.innerHTML = `<div class="card" style="opacity:0.4;">⏳ 等待装入</div>`;
        }

        highlightStage(stage);
    }

    // 播放过渡动画（配合日志）
    function transitionTo(newStage) {
        if (newStage === currentStage) return;
        if (newStage > currentStage) {
            // 正向
            if (currentStage === 0 && newStage >= 1) addLog('🔨 编译: 源程序 → 目标模块 (main.o, foo.o)');
            if (currentStage === 1 && newStage >= 2) addLog('⛓️ 链接: 目标模块 + 库函数 → 合并为可执行装入模块');
            if (currentStage === 2 && newStage >= 3) addLog('📦 生成装入模块: 完整的可执行文件');
            if (currentStage === 3 && newStage >= 4) addLog('💾 装入: 将装入模块加载到内存，分配物理地址');
            if (newStage === 4) addLog('✅ 程序已装入内存，等待执行');
        } else {
            // 逆向
            addLog(`⬅️ 回退到阶段 ${newStage}`);
        }
        currentStage = newStage;
        renderStage(currentStage);
    }

    function next() {
        if (currentStage < maxStage) {
            transitionTo(currentStage + 1);
        } else {
            addLog('🏁 已完成全部流程，点击重置重新演示');
        }
    }

    function prev() {
        if (currentStage > 0) {
            transitionTo(currentStage - 1);
        } else {
            addLog('🔁 已在起始阶段');
        }
    }

    function reset() {
        transitionTo(0);
        addLog('🔄 重置演示，回到源程序阶段');
    }

    // 绑定按钮
    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.getElementById('resetBtn').addEventListener('click', reset);

    // 初始化
    renderStage(0);
    addLog('📂 初始: 源程序 main.c 和 foo.c');
</script>
</body>
</html>
