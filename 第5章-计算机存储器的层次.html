<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>计算机存储器层次结构 - 交互式动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0e7f0 0%, #cbd5e1 100%);
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 主容器 */
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 头部 */
        .header {
            background: #1e2f3c;
            padding: 1.2rem 2rem;
            color: white;
        }
        .header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 两列布局 */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            padding: 2rem;
            gap: 2rem;
        }

        /* 左侧金字塔/层级区 */
        .hierarchy {
            flex: 1.2;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* 每个层级卡片 */
        .level-card {
            background: white;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2eaf0;
            position: relative;
            z-index: 2;
        }
        .level-card:hover {
            transform: translateX(8px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.15);
            border-color: #b9d0e0;
        }
        .level-card.active {
            background: #eef3fc;
            border-left: 6px solid #2c7da0;
            transform: translateX(4px);
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.1);
        }
        .level-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1f4662;
        }
        .level-icon {
            font-size: 1.8rem;
            opacity: 0.7;
        }

        /* 连接装饰线 (视觉暗示层次) */
        .hierarchy::before {
            content: '';
            position: absolute;
            left: 30px;
            top: 50px;
            bottom: 50px;
            width: 3px;
            background: linear-gradient(to bottom, #7f9cba, #cbdae6);
            border-radius: 3px;
            z-index: 1;
            opacity: 0.4;
        }

        /* 右侧详情面板 */
        .detail-panel {
            flex: 1;
            background: #fefefe;
            border-radius: 32px;
            padding: 1.5rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e6edf4;
            transition: all 0.2s;
        }
        .detail-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3e50;
            border-left: 5px solid #2c7da0;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .detail-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .info-block {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1rem;
        }
        .info-label {
            font-weight: 600;
            color: #2c7da0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }
        .info-text {
            color: #2c4e6e;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .param-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .param-chip {
            background: #eef2f7;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-family: monospace;
        }
        footer {
            background: #f0f4f9;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6f8eaa;
            border-top: 1px solid #dce5ec;
        }
        @media (max-width: 780px) {
            .main-layout { flex-direction: column; }
            .level-card:hover { transform: translateX(0); }
            .hierarchy::before { display: none; }
        }
        /* 小动画 */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-panel {
            animation: fadeSlide 0.25s ease-out;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 计算机存储器层次结构</h1>
        <p>从寄存器到可移动介质 | 速度递减 · 容量递增 · 成本递减</p>
    </div>
    <div class="main-layout">
        <!-- 左侧层级列表 -->
        <div class="hierarchy" id="hierarchyList">
            <div class="level-card" data-level="register">
                <span class="level-name">🔹 寄存器</span>
                <span class="level-icon">⚡</span>
            </div>
            <div class="level-card" data-level="cache">
                <span class="level-name">🔸 高速缓存 (Cache)</span>
                <span class="level-icon">🚀</span>
            </div>
            <div class="level-card" data-level="memory">
                <span class="level-name">🔹 内存储器 (主存)</span>
                <span class="level-icon">💾</span>
            </div>
            <div class="level-card" data-level="diskcache">
                <span class="level-name">🔸 磁盘缓存</span>
                <span class="level-icon">🗃️</span>
            </div>
            <div class="level-card" data-level="hdd">
                <span class="level-name">🔹 固定磁盘</span>
                <span class="level-icon">💿</span>
            </div>
            <div class="level-card" data-level="removable">
                <span class="level-name">🔸 可移动存储介质</span>
                <span class="level-icon">📀</span>
            </div>
        </div>

        <!-- 右侧详情展示区 -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-title" id="detailTitle">寄存器</div>
            <div class="detail-content" id="detailContent">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
    <footer>💡 点击左侧任意层级，查看详细硬件、核心参数与特点 | 存储器层次结构由上到下速度变慢、容量增大</footer>
</div>

<script>
    // 定义每个层级的详细数据
    const levelData = {
        register: {
            title: "📌 寄存器",
            hardware: ["CPU 内部寄存器 (EAX, EBX, PC, IR等)", "浮点寄存器", "向量寄存器 (AVX/SSE)"],
            params: ["容量: 几十字节 ~ 几百字节", "速度: < 1 ns (与CPU同频)", "成本: 极高 (晶体管级别)"],
            features: [
                "位于CPU内核，速度最快，零延迟",
                "存储当前正在执行的指令和数据",
                "数量极少，由编译器直接分配",
                "断电即丢失 (易失性)"
            ]
        },
        cache: {
            title: "⚡ 高速缓存 (Cache)",
            hardware: ["L1 Cache (指令/数据分离)", "L2 Cache (每核私有)", "L3 Cache (多核共享)", "SRAM 芯片"],
            params: ["容量: 32KB ~ 几十MB", "速度: 1 ~ 10 ns", "命中率 ~90% 以上"],
            features: [
                "利用程序局部性原理，缓解CPU与主存速度差距",
                "多级结构: L1最快最小，L3更大但较慢",
                "由硬件自动管理，对软件透明",
                "写策略: 写直达/写回"
            ]
        },
        memory: {
            title: "💾 内存储器 (主存/RAM)",
            hardware: ["DRAM (DDR4/DDR5)", "SRAM (少量用作缓存)", "ROM (BIOS芯片)"],
            params: ["容量: 4GB ~ 128GB (常见)", "速度: 50 ~ 100 ns", "带宽: 25 ~ 100 GB/s"],
            features: [
                "直接与CPU交换数据，存放运行中的程序和数据",
                "随机存取，字节寻址",
                "易失性 (断电数据丢失)",
                "虚拟内存技术通过页面文件扩展逻辑容量"
            ]
        },
        diskcache: {
            title: "🗃️ 磁盘缓存",
            hardware: ["磁盘控制器内置缓存 (HDD缓存)", "操作系统页缓存 (Page Cache)", "固态硬盘 DRAM缓存"],
            params: ["容量: 16MB ~ 1GB (硬件缓存)", "速度: 微秒级 (比磁盘快数十倍)", "命中率影响系统IO性能"],
            features: [
                "介于内存与磁盘之间，缓冲读写请求",
                "减少磁盘I/O次数，提升响应速度",
                "写缓存可合并写入，读缓存预读数据",
                "断电可能导致数据丢失 (需日志/电容保护)"
            ]
        },
        hdd: {
            title: "💿 固定磁盘 (硬盘)",
            hardware: ["机械硬盘 (HDD) 磁头/盘片", "固态硬盘 (SSD) NAND闪存", "NVMe / SATA 接口"],
            params: ["容量: 256GB ~ 20TB", "HDD速度: 5~10ms 寻道时间", "SSD速度: 0.1~0.5ms 延迟"],
            features: [
                "非易失性存储，断电保留数据",
                "机械硬盘通过磁道扇区存储，怕震动",
                "固态硬盘无机械部件，抗冲击，读写快",
                "作为操作系统和文件系统的主存储"
            ]
        },
        removable: {
            title: "📀 可移动存储介质",
            hardware: ["USB 闪存盘 (U盘)", "存储卡 (SD/microSD)", "光盘 (CD/DVD/蓝光)", "移动硬盘", "磁带"],
            params: ["容量: 几GB ~ 数TB", "速度: 几MB/s ~ 几百MB/s", "便携性强"],
            features: [
                "便于数据交换与备份",
                "不同介质寿命差异大 (U盘擦写次数有限，光盘怕划伤)",
                "热插拔支持，使用文件系统 (FAT32/exFAT/NTFS)",
                "成本相对较低，适合离线归档"
            ]
        }
    };

    // 获取DOM元素
    const detailTitle = document.getElementById('detailTitle');
    const detailContent = document.getElementById('detailContent');
    const cards = document.querySelectorAll('.level-card');
    let activeLevel = 'register';

    // 渲染详情面板
    function renderDetail(levelKey) {
        const data = levelData[levelKey];
        if (!data) return;
        detailTitle.innerHTML = data.title;
        // 构建内容
        let html = `
            <div class="info-block">
                <div class="info-label">🖥️ 常见硬件</div>
                <div class="info-text">${data.hardware.map(h => `• ${h}`).join('<br>')}</div>
            </div>
            <div class="info-block">
                <div class="info-label">⚙️ 核心参数</div>
                <div class="param-grid">${data.params.map(p => `<span class="param-chip">${p}</span>`).join('')}</div>
            </div>
            <div class="info-block">
                <div class="info-label">✨ 特点与说明</div>
                <div class="info-text">${data.features.map(f => `✓ ${f}`).join('<br>')}</div>
            </div>
        `;
        detailContent.innerHTML = html;
        // 更新激活样式
        cards.forEach(card => {
            const lvl = card.getAttribute('data-level');
            if (lvl === levelKey) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }
        });
        activeLevel = levelKey;
    }

    // 绑定点击事件
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const level = card.getAttribute('data-level');
            if (level) renderDetail(level);
        });
    });

    // 初始默认显示寄存器
    renderDetail('register');

    // 增加平滑动画（可选）
    const observer = new MutationObserver(() => {
        // 无需额外动作
    });
    observer.observe(detailContent, { childList: true, subtree: true });
</script>
</body>
</html>
